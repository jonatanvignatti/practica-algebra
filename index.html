<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Práctica · Introducción al Álgebra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee;
  --surface: #fffef9;
  --surface2: #f0ede6;
  --border: #ddd8cc;
  --border2: #c8c2b4;
  --text: #1a1814;
  --text2: #5a5650;
  --text3: #9a948c;
  --accent: #2a4d2a;
  --accent-light: #e8f0e8;
  --accent-mid: #4a7c4a;
  --red: #8b2020;
  --red-light: #fdf0f0;
  --gold: #7a5e20;
  --gold-light: #fdf6e8;
  --blue: #1a3a5c;
  --blue-light: #edf3fa;
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Instrument Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.65;
}

/* ── Layout ── */
.shell {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 24px 80px;
}

/* ── Header ── */
.site-header {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 50;
}
.header-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text);
  letter-spacing: -0.02em;
}
.brand-sub {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* ── Timer ── */
.timer-box {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 12px;
}
.timer-icon {
  width: 14px;
  height: 14px;
  color: var(--text3);
}
.timer-display {
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.04em;
  min-width: 56px;
}
.timer-box.warn { border-color: #e07070; background: var(--red-light); }
.timer-box.warn .timer-display { color: var(--red); }
.timer-box.urgent { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

.btn-icon {
  width: 34px;
  height: 34px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  color: var(--text2);
}
.btn-icon:hover { background: var(--surface2); border-color: var(--border2); }
.btn-icon svg { width: 16px; height: 16px; }

/* ── Progress ── */
.progress-strip {
  height: 3px;
  background: var(--border);
  position: relative;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s ease;
}

/* ── Main content ── */
.main {
  padding-top: 28px;
}

/* ── Score row ── */
.score-row {
  display: flex;
  gap: 10px;
  margin-bottom: 22px;
}
.score-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  text-align: center;
  min-width: 80px;
}
.score-num {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--text);
  display: block;
  line-height: 1.2;
}
.score-lbl {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ── Topic filter ── */
.filter-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.chip {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.chip:hover { border-color: var(--border2); color: var(--text); }
.chip.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* ── Question card ── */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 16px;
}
.q-top {
  padding: 20px 24px 0;
}
.q-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.q-topic-badge {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 20px;
}
.badge-sum { background: var(--blue-light); color: var(--blue); }
.badge-prog { background: var(--gold-light); color: var(--gold); }
.badge-ind { background: var(--red-light); color: var(--red); }
.badge-bin { background: var(--accent-light); color: var(--accent); }
.badge-trig { background: #f0eaff; color: #4a2080; }

.q-pts {
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}
.q-num {
  font-family: 'DM Serif Display', serif;
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 4px;
}
.q-text {
  font-size: 15px;
  color: var(--text);
  white-space: pre-line;
  line-height: 1.7;
  margin-bottom: 12px;
}
.math-block {
  background: var(--surface2);
  border-left: 3px solid var(--border2);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 12px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text);
  white-space: pre-wrap;
  line-height: 1.9;
  margin-bottom: 12px;
  overflow-x: auto;
}
.hint-box {
  background: var(--gold-light);
  border: 1px solid #e8d8a0;
  border-radius: var(--radius);
  padding: 9px 14px;
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 14px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.hint-icon { flex-shrink: 0; margin-top: 1px; }

/* ── Answer area ── */
.q-body {
  padding: 0 24px 20px;
}
.answer-textarea {
  width: 100%;
  min-height: 100px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: 'Instrument Sans', sans-serif;
  color: var(--text);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 12px;
  line-height: 1.6;
}
.answer-textarea:focus { border-color: var(--border2); background: var(--surface); }
.answer-textarea::placeholder { color: var(--text3); }

.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Instrument Sans', sans-serif;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.btn:hover { background: var(--surface2); border-color: var(--border2); color: var(--text); }
.btn:active { transform: scale(0.97); }
.btn svg { width: 14px; height: 14px; }
.btn-reveal {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.btn-reveal:hover { background: var(--accent-mid); border-color: var(--accent-mid); color: #fff; }
.btn-hide {
  background: var(--surface2);
  border-color: var(--border2);
  color: var(--text);
}
.btn-clear { color: var(--red); border-color: #e8c0c0; }
.btn-clear:hover { background: var(--red-light); }

/* ── Solution ── */
.solution-panel {
  border-top: 1px solid var(--border);
  padding: 18px 24px 20px;
  background: #f9f8f4;
  display: none;
}
.solution-panel.visible { display: block; }
.sol-header {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sol-step {
  font-size: 13.5px;
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  line-height: 1.85;
  padding: 2px 0;
}
.sol-step.empty { height: 8px; }
.sol-result {
  margin-top: 12px;
  display: inline-block;
  background: var(--accent-light);
  border: 1px solid #b8d0b8;
  border-radius: var(--radius);
  padding: 8px 14px;
  font-size: 14px;
  font-weight: 600;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
}

/* ── Navigation ── */
.nav-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 8px;
}
.nav-dots {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
  flex: 1;
}
.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.2s;
  cursor: pointer;
}
.dot.seen { background: var(--text3); }
.dot.current { background: var(--accent); width: 22px; border-radius: 4px; }
.btn-nav {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Instrument Sans', sans-serif;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-nav:hover { background: var(--surface2); }
.btn-nav:active { transform: scale(0.97); }
.btn-nav:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
.btn-nav svg { width: 15px; height: 15px; }

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text3);
  font-size: 15px;
}

/* ── Modal overlay ── */
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(26,24,20,0.55);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 36px 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 26px;
  margin-bottom: 8px;
  color: var(--text);
}
.modal p { font-size: 15px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
.modal-btns { display: flex; gap: 10px; justify-content: center; }
.btn-modal-ok {
  padding: 9px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  font-family: 'Instrument Sans', sans-serif;
  cursor: pointer;
}
.btn-modal-cancel {
  padding: 9px 24px;
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: 'Instrument Sans', sans-serif;
  cursor: pointer;
}

/* ── Responsive ── */
@media (max-width: 560px) {
  .brand-sub { display: none; }
  .score-row { gap: 6px; }
  .score-chip { min-width: 60px; padding: 6px 8px; }
  .q-top, .q-body, .solution-panel { padding-left: 16px; padding-right: 16px; }
  .nav-row { flex-wrap: wrap; }
  .nav-dots { order: -1; width: 100%; }
}

/* ── Accessibility ── */
.sr-only {
  position: absolute; width: 1px; height: 1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap;
}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="brand-name">Álgebra</span>
      <span class="brand-sub">Práctica tipo prueba</span>
    </div>
    <div class="header-right">
      <div class="timer-box" id="timerBox" role="timer" aria-label="Tiempo restante">
        <svg class="timer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span class="timer-display" id="timerDisplay">60:00</span>
      </div>
      <button class="btn-icon" onclick="askReset()" title="Reiniciar práctica" aria-label="Reiniciar práctica">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.07"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="progress-strip">
    <div class="progress-fill" id="progFill" style="width:0%"></div>
  </div>
</header>

<div class="shell">
  <main class="main" id="mainArea">

    <div class="score-row" role="status" aria-live="polite">
      <div class="score-chip">
        <span class="score-num" id="scSeen">0</span>
        <span class="score-lbl">vistas</span>
      </div>
      <div class="score-chip">
        <span class="score-num" id="scSol">0</span>
        <span class="score-lbl">soluciones</span>
      </div>
      <div class="score-chip">
        <span class="score-num" id="scPct">—</span>
        <span class="score-lbl">avance</span>
      </div>
      <div class="score-chip">
        <span class="score-num" id="scPts">0</span>
        <span class="score-lbl">puntos vistos</span>
      </div>
    </div>

    <div class="filter-row" id="filterRow" role="group" aria-label="Filtrar por tema"></div>

    <div id="qArea"></div>

    <nav class="nav-row" aria-label="Navegación entre preguntas">
      <button class="btn-nav" id="btnPrev" onclick="go(-1)" aria-label="Pregunta anterior">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
        Anterior
      </button>
      <div class="nav-dots" id="navDots" aria-hidden="true"></div>
      <button class="btn-nav" id="btnNext" onclick="go(1)" aria-label="Siguiente pregunta">
        Siguiente
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </nav>

  </main>
</div>

<!-- Reset confirmation modal -->
<div class="modal-bg" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal">
    <h3 id="modalTitle">¿Reiniciar?</h3>
    <p>Se borrará todo el progreso, las respuestas escritas y el cronómetro volverá a 60 minutos.</p>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-ok" onclick="doReset()">Sí, reiniciar</button>
    </div>
  </div>
</div>

<script>
const TOPICS = ['Sumatorias','Progresiones','Inducción','Binomio','Trigonometría'];
const BADGE_CLASS = {
  'Sumatorias':'badge-sum','Progresiones':'badge-prog',
  'Inducción':'badge-ind','Binomio':'badge-bin','Trigonometría':'badge-trig'
};

const QS = [
  {
    id:0, topic:'Sumatorias', pts:4, n:1,
    text:'Calcule el valor exacto usando propiedades y fórmulas notables. No se aceptan verificaciones numéricas directas.',
    math:'∑(i=1 hasta 20) (4i² − 3i + 2)',
    hint:'Separe con linealidad: 4·∑i² − 3·∑i + ∑2. Use n=20 en cada fórmula.',
    steps:['Aplicando linealidad:','  4·∑i² − 3·∑i + 2·20','','Con n=20:','  ∑i² = 20·21·41/6 = 2870','  ∑i  = 20·21/2  = 210','  ∑2  = 20·2    = 40','','= 4(2870) − 3(210) + 40','= 11480 − 630 + 40'],
    result:'= 10 890'
  },
  {
    id:1, topic:'Sumatorias', pts:3, n:2,
    text:'Calcule la suma telescópica. Muestre explícitamente los primeros y últimos términos antes de simplificar.',
    math:'∑(i=1 hasta 50) (1/i − 1/(i+1))',
    hint:'Escriba los primeros términos: (1−1/2)+(1/2−1/3)+···+(1/50−1/51). Los intermedios se cancelan.',
    steps:['Desarrollo telescópico:','  i=1: 1/1 − 1/2','  i=2: 1/2 − 1/3','  ···         ···','  i=50: 1/50 − 1/51','','Todos los intermedios se cancelan.','Quedan solo: 1/1 − 1/51 = (51−1)/51'],
    result:'= 50/51'
  },
  {
    id:2, topic:'Sumatorias', pts:3, n:3,
    text:'Exprese en notación sigma y calcule el valor exacto.',
    math:'1/3⁰ + 1/3¹ + 1/3² + ··· + 1/3¹⁰',
    hint:'Cada término es (1/3)ⁱ. Es una suma geométrica con r=1/3, desde i=0 hasta i=10.',
    steps:['En sigma: ∑(i=0 a 10) (1/3)ⁱ','','Es geométrica con r=1/3, n=10:','  S = (r^(n+1) − 1)/(r − 1)','  S = ((1/3)¹¹ − 1)/(1/3 − 1)','    = (1 − (1/3)¹¹) / (2/3)','    = (3/2)·(1 − 1/177147)'],
    result:'≈ 1.4999916   (exacto: 3/2·(1−3⁻¹¹))'
  },
  {
    id:3, topic:'Sumatorias', pts:8, n:4,
    text:'La potencia total (mW) consumida por n nodos es:\n\na) Obtenga la fórmula cerrada en función de n.\nb) Determine el menor n con P > 1000 mW. Justifique algebraicamente.',
    math:'P(n) = ∑(k=1 a n) (3k² + 5)',
    hint:'a) Use 3·∑k² + 5·∑1. b) Resuelva la inecuación evaluando valores cercanos.',
    steps:['a) P(n) = 3·n(n+1)(2n+1)/6 + 5n','        = n(n+1)(2n+1)/2 + 5n','        = n[(n+1)(2n+1)+10]/2','        = n(2n²+3n+11)/2','','b) n(2n²+3n+11)/2 > 1000','   n=9:  9(162+27+11)/2 = 9·200/2 = 900  ✗','   n=10: 10(200+30+11)/2 = 10·241/2 = 1205 ✓'],
    result:'Fórmula: n(2n²+3n+11)/2 · · · n_min = 10'
  },
  {
    id:4, topic:'Progresiones', pts:9, n:5,
    text:'Una empresa produce 120 piezas el primer mes e incrementa 15 piezas cada mes (P.A.).\n\na) Término general aₙ. Identifique a₁ y d.\nb) ¿En qué mes supera por primera vez las 500 piezas?\nc) Producción acumulada en los primeros 24 meses.',
    math:'a₁ = 120   d = 15   Sₙ = n(a₁+aₙ)/2',
    hint:'b) Resuelva aₙ > 500. c) Calcule a₂₄ primero, luego use la fórmula de Sₙ.',
    steps:['a) aₙ = 120 + (n−1)·15 = 15n + 105','   a₁=120, d=15','','b) 15n+105 > 500  →  15n > 395  →  n > 26.33','   n=27: a₂₇ = 15(27)+105 = 405+105 = 510 > 500 ✓','','c) a₂₄ = 15(24)+105 = 360+105 = 465','   S₂₄ = 24·(120+465)/2 = 24·585/2 = 12·585'],
    result:'a) 15n+105   b) Mes 27   c) S₂₄ = 7020 piezas'
  },
  {
    id:5, topic:'Progresiones', pts:9, n:6,
    text:'Equipo industrial: valor inicial $80 000, conserva el 75% cada año (P.G.).\n\na) Término general aₙ. Identifique a₁ y r.\nb) ¿Al final de qué año vale menos de $10 000? (Use logaritmos.)\nc) ¿La suma acumulada supera $200 000 antes del año 6?',
    math:'a₁ = 80000   r = 0.75   Sₙ = a₁(1−rⁿ)/(1−r)',
    hint:'b) Aplique log a ambos lados: n·log(0.75) < log(10000/80000). c) Calcule S₆ directamente.',

/* ── State ── */
let current = 0;
let activeTopic = 'All';
let solShown = new Set();
let seen = new Set();
let answers = {};
let timerSec = 3600;
let timerInterval = null;

/* ── Timer ── */
function fmtTime(s) {
  const m = Math.floor(s / 60), ss = s % 60;
  return String(m).padStart(2,'0') + ':' + String(ss).padStart(2,'0');
}
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSec--;
    const el = document.getElementById('timerDisplay');
    const box = document.getElementById('timerBox');
    el.textContent = fmtTime(timerSec);
    if (timerSec <= 300) { box.classList.add('warn'); box.classList.remove('urgent'); }
    if (timerSec <= 60) box.classList.add('urgent');
    if (timerSec <= 0) { clearInterval(timerInterval); el.textContent = '00:00'; }
  }, 1000);
}

/* ── Filtered list ── */
function filtered() {
  return activeTopic === 'All' ? QS : QS.filter(q => q.topic === activeTopic);
}

/* ── Render topic chips ── */
function renderFilter() {
  const bar = document.getElementById('filterRow');
  const all = ['All', ...TOPICS];
  bar.innerHTML = all.map(t => {
    const label = t === 'All' ? 'Todos los temas' : t;
    return `<button class="chip${activeTopic===t?' active':''}" onclick="setTopic('${t}')" aria-pressed="${activeTopic===t}">${label}</button>`;
  }).join('');
}

function setTopic(t) {
  activeTopic = t;
  current = 0;
  renderFilter();
  renderQ();
}

/* ── Dots ── */
function renderDots() {
  const qs = filtered();
  const container = document.getElementById('navDots');
  container.innerHTML = qs.map((q, i) => {
    let cls = 'dot';
    if (i === current) cls += ' current';
    else if (seen.has(q.id)) cls += ' seen';
    return `<div class="${cls}" onclick="jumpTo(${i})" title="Ejercicio ${i+1}"></div>`;
  }).join('');
}

function jumpTo(i) {
  saveCurrentAns();
  current = i;
  renderQ();
}

/* ── Save answer ── */
function saveCurrentAns() {
  const qs = filtered();
  if (!qs[current]) return;
  const id = qs[current].id;
  const el = document.getElementById('answerArea');
  if (el) answers[id] = el.value;
}

/* ── Score ── */
function updateScore() {
  const qs = filtered();
  const ptsVis = [...solShown].reduce((sum, id) => {
    const q = QS.find(x => x.id === id);
    return sum + (q ? q.pts : 0);
  }, 0);
  document.getElementById('scSeen').textContent = seen.size;
  document.getElementById('scSol').textContent = solShown.size;
  document.getElementById('scPct').textContent = qs.length ? Math.round(seen.size / qs.length * 100) + '%' : '—';
  document.getElementById('scPts').textContent = ptsVis;
}

/* ── Main render ── */
function renderQ() {
  const qs = filtered();
  const area = document.getElementById('qArea');

  if (!qs.length) {
    area.innerHTML = '<p class="empty">Sin ejercicios para este tema.</p>';
    renderDots();
    return;
  }
  if (current >= qs.length) current = qs.length - 1;
  if (current < 0) current = 0;

  const q = qs[current];
  seen.add(q.id);
  updateScore();

  const isSol = solShown.has(q.id);
  const savedAns = answers[q.id] || '';

  const stepsHtml = q.steps.map(s =>
    s ? `<div class="sol-step">${escHtml(s)}</div>`
      : `<div class="sol-step empty"></div>`
  ).join('');

  area.innerHTML = `
    <div class="q-card">
      <div class="q-top">
        <div class="q-meta">
          <span class="q-topic-badge ${BADGE_CLASS[q.topic]}">${q.topic}</span>
          <span class="q-pts">${q.pts} pts</span>
        </div>
        <div class="q-num">Ejercicio ${q.n} de ${QS.length}</div>
        <div class="q-text">${escHtml(q.text)}</div>
        ${q.math ? `<div class="math-block">${escHtml(q.math)}</div>` : ''}
        ${q.hint ? `<div class="hint-box">
          <span class="hint-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </span>
          <span>${escHtml(q.hint)}</span>
        </div>` : ''}
      </div>
      <div class="q-body">
        <label class="sr-only" for="answerArea">Tu desarrollo para el ejercicio ${q.n}</label>
        <textarea class="answer-textarea" id="answerArea" placeholder="Escribe tu desarrollo aquí…" aria-label="Área de respuesta">${escHtml(savedAns)}</textarea>
        <div class="actions">
          <button class="btn ${isSol ? 'btn-hide' : 'btn-reveal'}" onclick="toggleSol(${q.id})" aria-expanded="${isSol}">
            ${isSol
              ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg> Ocultar solución`
              : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> Ver solución`
            }
          </button>
          <button class="btn btn-clear" onclick="clearAns(${q.id})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            Limpiar
          </button>
        </div>
      </div>
      <div class="solution-panel${isSol ? ' visible' : ''}" id="solPanel" aria-live="polite">
        <div class="sol-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          Solución paso a paso
        </div>
        ${stepsHtml}
        <div class="sol-result">${escHtml(q.result)}</div>
      </div>
    </div>`;

  document.getElementById('progFill').style.width = `${((current + 1) / qs.length) * 100}%`;
  document.getElementById('btnPrev').disabled = current === 0;
  const nextBtn = document.getElementById('btnNext');
  if (current === qs.length - 1) {
    nextBtn.innerHTML = `Finalizar <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>`;
  } else {
    nextBtn.innerHTML = `Siguiente <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>`;
  }
  renderDots();
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleSol(id) {
  saveCurrentAns();
  if (solShown.has(id)) solShown.delete(id);
  else solShown.add(id);
  updateScore();
  renderQ();
}

function clearAns(id) {
  answers[id] = '';
  const el = document.getElementById('answerArea');
  if (el) el.value = '';
}

function go(dir) {
  saveCurrentAns();
  const qs = filtered();
  current = Math.max(0, Math.min(qs.length - 1, current + dir));
  renderQ();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Reset ── */
function askReset() {
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function doReset() {
  closeModal();
  clearInterval(timerInterval);
  timerSec = 3600;
  solShown = new Set();
  seen = new Set();
  answers = {};
  current = 0;
  activeTopic = 'All';
  document.getElementById('timerDisplay').textContent = '60:00';
  document.getElementById('timerBox').classList.remove('warn','urgent');
  renderFilter();
  renderQ();
  updateScore();
  startTimer();
}

/* Close modal on bg click */
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* Keyboard nav */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') go(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   go(-1);
});

/* ── Init ── */
renderFilter();
renderQ();
startTimer();
</script>
